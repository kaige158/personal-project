<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title=pet.name + ' - 宠物详情'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">首页</a></li>
                <li class="breadcrumb-item"><a href="/pet/list">找宠物</a></li>
                <li class="breadcrumb-item active" th:text="${pet.name}">宠物名</li>
            </ol>
        </nav>

        <div class="row">
            <!-- 左侧：照片轮播 -->
            <div class="col-md-6">
                <!-- 有照片时显示轮播 -->
                <div th:if="${not #lists.isEmpty(images)}" id="petCarousel" class="carousel slide pet-carousel" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button th:each="img,iterStat : ${images}" type="button" data-bs-target="#petCarousel"
                                th:data-bs-slide-to="${iterStat.index}" th:classappend="${iterStat.first} ? 'active'"></button>
                    </div>
                    <div class="carousel-inner rounded">
                        <div th:each="img,iterStat : ${images}" class="carousel-item" th:classappend="${iterStat.first} ? 'active'">
                            <img th:src="${img.imageUrl}" class="d-block w-100" alt="宠物照片">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#petCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#petCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
                <!-- 无照片时显示占位图 -->
                <div th:if="${#lists.isEmpty(images)}" class="text-center py-5 bg-light rounded">
                    <i class="bi bi-image" style="font-size:5rem;color:#ccc;"></i>
                    <p class="text-muted">暂无照片</p>
                </div>
            </div>

            <!-- 右侧：详细信息 -->
            <div class="col-md-6">
                <h3 th:text="${pet.name}">宠物名</h3>
                <span class="badge bg-success" th:if="${pet.status == 0}">待领养</span>
                <span class="badge bg-secondary" th:if="${pet.status == 1}">已领养</span>
                <hr>

                <table class="table table-bordered">
                    <tr><th width="100">品种</th><td th:text="${pet.breed}">-</td></tr>
                    <tr><th>分类</th><td th:text="${pet.categoryName}">-</td></tr>
                    <tr><th>年龄</th><td th:text="${pet.age}">-</td></tr>
                    <tr><th>性别</th><td th:text="${pet.gender == 1 ? '公' : '母'}">-</td></tr>
                    <tr><th>体型</th><td th:text="${pet.size}">-</td></tr>
                    <tr><th>健康状况</th><td th:text="${pet.healthStatus}">-</td></tr>
                    <tr><th>所在机构</th><td th:text="${pet.orgName}">-</td></tr>
                </table>

                <h5>详细描述</h5>
                <p class="text-muted" th:text="${pet.description}">暂无描述</p>

                <!-- 操作按钮 -->
                <div class="mt-3">
                    <!-- 已登录普通用户可申请领养 -->
                    <th:block th:if="${session.loginUser != null AND session.loginUser.role == 0 AND pet.status == 0}">
                        <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#applyModal">
                            <i class="bi bi-heart"></i> 申请领养
                        </button>
                        <button class="btn btn-outline-danger btn-lg ms-2" id="favBtn"
                                th:attr="onclick='toggleFav(' + ${pet.id} + ')'">
                            <i class="bi bi-heart"></i> 收藏
                        </button>
                    </th:block>
                    <!-- 未登录 -->
                    <th:block th:if="${session.loginUser == null}">
                        <a href="/login" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> 登录后申请领养
                        </a>
                    </th:block>
                    <!-- 已领养/已下架 -->
                    <th:block th:if="${pet.status != 0}">
                        <button class="btn btn-secondary btn-lg" disabled>暂不可领养</button>
                    </th:block>
                </div>
            </div>
        </div>
    </main>

    <!-- 申请领养弹窗 -->
    <div class="modal fade" id="applyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">申请领养 - <span th:text="${pet.name}"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="applyForm">
                    <input type="hidden" name="petId" th:value="${pet.id}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">职业 <span class="text-danger">*</span></label>
                            <input type="text" name="occupation" class="form-control" placeholder="请输入您的职业" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">住房类型 <span class="text-danger">*</span></label>
                            <select name="housingType" class="form-select" required>
                                <option value="">请选择</option>
                                <option value="自有">自有住房</option>
                                <option value="租房">租房</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">饲养经验</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="hasExperience" value="1">
                                <label class="form-check-label">有饲养经验</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="hasExperience" value="0" checked>
                                <label class="form-check-label">无饲养经验</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">申请理由 <span class="text-danger">*</span></label>
                            <textarea name="reason" class="form-control" rows="4" placeholder="请说明您为什么想领养这只宠物..." required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">提交申请</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        // 提交领养申请
        $('#applyForm').submit(function(e) {
            e.preventDefault();
            $.post('/application/submit', $(this).serialize(), function(res) {
                if (res.code === 200) {
                    alert(res.msg);
                    location.reload();
                } else {
                    alert(res.msg);
                }
            }, 'json');
        });

        // 收藏/取消收藏
        function toggleFav(petId) {
            $.post('/favorite/add', {petId: petId}, function(res) {
                alert(res.msg);
            }, 'json');
        }
    </script>
</body>
</html>
