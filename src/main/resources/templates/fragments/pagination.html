<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 分页公共片段 -->
<nav th:fragment="pagination(page)" th:if="${page.total > 0}">
    <div class="d-flex justify-content-between align-items-center">
        <span class="text-muted">
            共 <b th:text="${page.total}">0</b> 条记录，第 <b th:text="${page.current}">1</b>/<b th:text="${page.pages}">1</b> 页
        </span>
        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                <a class="page-link" th:href="'?page=' + ${page.current - 1} + '&size=' + ${page.size}">&laquo;</a>
            </li>
            <th:block th:each="i : ${#numbers.sequence(1, #ctx.page.pages > 7 ? 7 : #ctx.page.pages)}">
                <li class="page-item" th:classappend="${i == page.current} ? 'active'">
                    <a class="page-link" th:href="'?page=' + ${i} + '&size=' + ${page.size}" th:text="${i}">1</a>
                </li>
            </th:block>
            <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                <a class="page-link" th:href="'?page=' + ${page.current + 1} + '&size=' + ${page.size}">&raquo;</a>
            </li>
        </ul>
    </div>
</nav>
</html>
