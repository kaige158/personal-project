<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='养宠知识')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-book"></i> 养宠知识科普</h4>
        <hr>
        <div class="row">
            <div class="col-md-4 mb-3" th:each="article : ${page.records}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${article.title}">标题</h5>
                        <p class="card-text text-muted small">
                            <i class="bi bi-hand-thumbs-up"></i> <span th:text="${article.likeCount}">0</span>
                            <i class="bi bi-eye ms-2"></i> <span th:text="${article.viewCount}">0</span>
                            <span class="ms-2" th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd')}">日期</span>
                        </p>
                        <a th:href="@{/article/detail/{id}(id=${article.id})}" class="btn btn-outline-primary btn-sm">阅读全文</a>
                    </div>
                </div>
            </div>
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(page.records)}">
                <p class="text-muted">暂无科普文章</p>
            </div>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
