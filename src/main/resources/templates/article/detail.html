<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title=article.title})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">首页</a></li>
                <li class="breadcrumb-item"><a href="/article/list">养宠知识</a></li>
                <li class="breadcrumb-item active" th:text="${article.title}">标题</li>
            </ol>
        </nav>

        <article class="card shadow-sm">
            <div class="card-body">
                <h2 th:text="${article.title}">标题</h2>
                <p class="text-muted">
                    <i class="bi bi-calendar"></i> <span th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                    <span class="ms-3"><i class="bi bi-eye"></i> <span th:text="${article.viewCount}">0</span> 阅读</span>
                    <span class="ms-3"><i class="bi bi-hand-thumbs-up"></i> <span id="likeCount" th:text="${article.likeCount}">0</span> 点赞</span>
                </p>
                <hr>
                <div th:text="${article.content}" style="white-space:pre-wrap;line-height:1.8;">内容</div>
                <hr>
                <button class="btn btn-outline-danger" th:attr="onclick='like(' + ${article.id} + ')'">
                    <i class="bi bi-hand-thumbs-up"></i> 点赞
                </button>
            </div>
        </article>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function like(id) {
            $.post('/article/like/' + id, function(res) {
                if (res.code === 200) {
                    $('#likeCount').text(res.data);
                    alert('点赞成功！');
                }
            }, 'json');
        }
    </script>
</body>
</html>
