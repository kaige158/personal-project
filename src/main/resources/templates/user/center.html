<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='个人中心')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-person-circle"></i> 个人中心</h4>
        <hr>
        <div class="row">
            <div class="col-md-3">
                <!-- 左侧菜单 -->
                <div class="list-group shadow-sm">
                    <a href="/user/center" class="list-group-item list-group-item-action active">
                        <i class="bi bi-person"></i> 个人信息
                    </a>
                    <a href="/application/my-applications" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-text"></i> 我的申请
                    </a>
                    <a href="/user/my-favorites" class="list-group-item list-group-item-action">
                        <i class="bi bi-heart"></i> 我的收藏
                    </a>
                    <a href="/user/my-notifications" class="list-group-item list-group-item-action">
                        <i class="bi bi-bell"></i> 消息通知
                    </a>
                    <a href="/user/edit" class="list-group-item list-group-item-action">
                        <i class="bi bi-pencil"></i> 修改资料
                    </a>
                    <a href="/user/password" class="list-group-item list-group-item-action">
                        <i class="bi bi-lock"></i> 修改密码
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <!-- 个人信息卡片 -->
                <div class="card shadow-sm">
                    <div class="card-header"><i class="bi bi-person-badge"></i> 基本信息</div>
                    <div class="card-body">
                        <table class="table">
                            <tr><th width="100">用户名</th><td th:text="${user.username}">-</td></tr>
                            <tr><th>真实姓名</th><td th:text="${user.realName} ?: '未填写'">-</td></tr>
                            <tr><th>手机号</th><td th:text="${user.phone} ?: '未填写'">-</td></tr>
                            <tr><th>邮箱</th><td th:text="${user.email} ?: '未填写'">-</td></tr>
                            <tr><th>地址</th><td th:text="${user.address} ?: '未填写'">-</td></tr>
                            <tr><th>注册时间</th><td th:text="${#temporals.format(user.createTime, 'yyyy-MM-dd HH:mm')}">-</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
