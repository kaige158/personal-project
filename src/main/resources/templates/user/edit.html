<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='修改资料')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-pencil"></i> 修改个人资料</h4>
        <hr>
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="/user/center" class="list-group-item list-group-item-action">个人信息</a>
                    <a href="/user/edit" class="list-group-item list-group-item-action active">修改资料</a>
                    <a href="/user/password" class="list-group-item list-group-item-action">修改密码</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="editForm">
                            <div class="mb-3">
                                <label class="form-label">真实姓名</label>
                                <input type="text" name="realName" class="form-control" th:value="${user.realName}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" name="phone" class="form-control" th:value="${user.phone}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" name="email" class="form-control" th:value="${user.email}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">地址</label>
                                <input type="text" name="address" class="form-control" th:value="${user.address}">
                            </div>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </form>
                        <div id="msg" class="alert mt-3" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#editForm').submit(function(e) {
            e.preventDefault();
            $.post('/user/updateProfile', $(this).serialize(), function(res) {
                var m = $('#msg');
                m.text(res.msg).show();
                m.removeClass('alert-danger').addClass(res.code === 200 ? 'alert-success' : 'alert-danger');
            }, 'json');
        });
    </script>
</body>
</html>
