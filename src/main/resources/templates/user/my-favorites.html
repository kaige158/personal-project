<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title='我的收藏'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-heart"></i> 我的收藏</h4>
        <hr>
        <div class="row" id="favList">
            <div class="col-12 text-center py-5 text-muted" id="noData">
                <i class="bi bi-inbox" style="font-size:3rem;"></i>
                <p class="mt-2">暂无收藏的宠物，去<a href="/pet/list">找宠物</a>看看吧</p>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        // 加载收藏列表
        $.get('/favorite/list', function(res) {
            if (res.code === 200 && res.data && res.data.length > 0) {
                $('#noData').hide();
                var html = '';
                res.data.forEach(function(fav) {
                    html += '<div class="col-md-3 mb-3"><div class="card pet-card h-100 shadow-sm">' +
                        '<img src="' + (fav.coverImage || 'https://via.placeholder.com/300x200?text=暂无照片') + '" class="card-img-top">' +
                        '<div class="card-body"><h5>' + fav.petName + '</h5>' +
                        '<p class="text-muted">' + (fav.petBreed || '') + '</p>' +
                        '<a href="/pet/detail/' + fav.petId + '" class="btn btn-outline-primary btn-sm">查看</a>' +
                        '<button class="btn btn-sm btn-outline-danger ms-1" onclick="removeFav(' + fav.petId + ')">取消收藏</button>' +
                        '</div></div></div>';
                });
                $('#favList').prepend(html);
            }
        }, 'json');

        function removeFav(petId) {
            if (confirm('确定取消收藏？')) {
                $.post('/favorite/remove', {petId: petId}, function(res) {
                    alert(res.msg); location.reload();
                }, 'json');
            }
        }
    </script>
</body>
</html>
