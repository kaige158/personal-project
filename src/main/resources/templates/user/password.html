<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title='修改密码'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-lock"></i> 修改密码</h4>
        <hr>
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="pwdForm">
                            <div class="mb-3">
                                <label class="form-label">旧密码</label>
                                <input type="password" name="oldPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">新密码</label>
                                <input type="password" name="newPassword" class="form-control" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary">修改密码</button>
                        </form>
                        <div id="msg" class="alert mt-3" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#pwdForm').submit(function(e) {
            e.preventDefault();
            $.post('/user/updatePassword', $(this).serialize(), function(res) {
                var m = $('#msg');
                m.text(res.msg).show();
                m.removeClass('alert-danger').addClass(res.code === 200 ? 'alert-success' : 'alert-danger');
                if (res.code === 200) {
                    setTimeout(function() { window.location.href = '/login'; }, 1500);
                }
            }, 'json');
        });
    </script>
</body>
</html>
