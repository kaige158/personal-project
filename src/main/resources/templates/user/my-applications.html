<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='我的申请')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-file-text"></i> 我的领养申请</h4>
        <hr>
        <div class="table-responsive">
            <table class="table table-hover shadow-sm">
                <thead class="table-primary">
                    <tr>
                        <th>宠物名称</th>
                        <th>职业</th>
                        <th>住房</th>
                        <th>状态</th>
                        <th>审核意见</th>
                        <th>申请时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${page.records}">
                        <td th:text="${app.petName}">-</td>
                        <td th:text="${app.occupation}">-</td>
                        <td th:text="${app.housingType}">-</td>
                        <td>
                            <span class="badge bg-warning" th:if="${app.status == 0}">待审核</span>
                            <span class="badge bg-success" th:if="${app.status == 1}">已通过</span>
                            <span class="badge bg-danger" th:if="${app.status == 2}">已驳回</span>
                            <span class="badge bg-info" th:if="${app.status == 3}">已领养</span>
                        </td>
                        <td th:text="${app.auditComment} ?: '-'">-</td>
                        <td th:text="${#temporals.format(app.createTime, 'yyyy-MM-dd HH:mm')}">-</td>
                        <td>
                            <!-- 已通过但未签协议 → 去签署 -->
                            <a th:if="${app.status == 1}" href="/user/agreement"
                               class="btn btn-sm btn-success">签署协议</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}">
                        <td colspan="7" class="text-center py-3 text-muted">暂无申请记录</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
