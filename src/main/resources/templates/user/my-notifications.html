<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='消息通知')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-bell"></i> 消息通知</h4>
        <hr>
        <div class="list-group" id="notifList">
            <div class="text-center py-5 text-muted" id="noData">
                <i class="bi bi-bell-slash" style="font-size:3rem;"></i>
                <p class="mt-2">暂无消息通知</p>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $.get('/notification/list', function(res) {
            if (res.code === 200 && res.data && res.data.length > 0) {
                $('#noData').hide();
                res.data.forEach(function(n) {
                    var cls = n.isRead === 0 ? 'list-group-item-warning' : '';
                    $('#notifList').append(
                        '<div class="list-group-item ' + cls + '">' +
                        '<div class="d-flex justify-content-between"><h6>' + n.title + '</h6>' +
                        '<small class="text-muted">' + n.createTime + '</small></div>' +
                        '<p class="mb-1">' + n.content + '</p></div>'
                    );
                });
            }
        }, 'json');
    </script>
</body>
</html>
