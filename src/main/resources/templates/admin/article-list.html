<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title='文章管理'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-book"></i> 科普文章管理</h4>
            <a href="/admin/article/add" class="btn btn-primary"><i class="bi bi-plus"></i> 新增文章</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover shadow-sm">
                <thead class="table-primary">
                    <tr><th>标题</th><th>点赞</th><th>浏览</th><th>发布时间</th><th>操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="article : ${page.records}">
                        <td th:text="${article.title}">-</td>
                        <td th:text="${article.likeCount}">0</td>
                        <td th:text="${article.viewCount}">0</td>
                        <td th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd')}">-</td>
                        <td>
                            <a th:href="@{/admin/article/edit/{id}(id=${article.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                            <button class="btn btn-sm btn-outline-danger" th:attr="onclick='del(' + ${article.id} + ')'">删除</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}"><td colspan="5" class="text-center py-3">暂无文章</td></tr>
                </tbody>
            </table>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function del(id) {
            if (confirm('确定删除？')) {
                $.post('/admin/article/delete/' + id, function(res) { alert(res.msg); location.reload(); }, 'json');
            }
        }
    </script>
</body>
</html>
