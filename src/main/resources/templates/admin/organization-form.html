<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title=${org != null ? '编辑机构' : '新增机构'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4 th:text="${org != null ? '编辑机构' : '新增机构'}">新增机构</h4>
        <hr>
        <div class="col-md-8">
            <form id="form">
                <input type="hidden" name="id" th:value="${org?.id}">
                <div class="mb-3">
                    <label class="form-label">名称</label>
                    <input type="text" name="name" class="form-control" th:value="${org?.name}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">地址</label>
                    <input type="text" name="address" class="form-control" th:value="${org?.address}">
                </div>
                <div class="mb-3">
                    <label class="form-label">电话</label>
                    <input type="text" name="phone" class="form-control" th:value="${org?.phone}">
                </div>
                <div class="mb-3">
                    <label class="form-label">简介</label>
                    <textarea name="description" class="form-control" rows="4" th:text="${org?.description}"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/admin/organization/list" class="btn btn-secondary">返回</a>
            </form>
            <div id="msg" class="alert mt-3" style="display:none;"></div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#form').submit(function(e) {
            e.preventDefault();
            $.post('/admin/organization/save', $(this).serialize(), function(res) {
                var m = $('#msg');
                m.text(res.msg).show();
                m.removeClass('alert-danger').addClass(res.code === 200 ? 'alert-success' : 'alert-danger');
                if (res.code === 200) setTimeout(function() { window.location.href = '/admin/organization/list'; }, 1000);
            }, 'json');
        });
    </script>
</body>
</html>
