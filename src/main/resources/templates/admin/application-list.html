<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='申请审核')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-file-earmark-check"></i> 领养申请审核</h4>
        <hr>
        <!-- 筛选 -->
        <div class="mb-3">
            <a href="?status=" class="btn btn-sm" th:classappend="${status == null ? 'btn-primary' : 'btn-outline-primary'}">全部</a>
            <a href="?status=0" class="btn btn-sm ms-1" th:classappend="${status == 0 ? 'btn-warning' : 'btn-outline-warning'}">待审核</a>
            <a href="?status=1" class="btn btn-sm ms-1" th:classappend="${status == 1 ? 'btn-success' : 'btn-outline-success'}">已通过</a>
            <a href="?status=2" class="btn btn-sm ms-1" th:classappend="${status == 2 ? 'btn-danger' : 'btn-outline-danger'}">已驳回</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover shadow-sm">
                <thead class="table-primary">
                    <tr>
                        <th>申请人</th><th>手机号</th><th>宠物</th><th>职业</th><th>住房</th><th>状态</th><th>申请时间</th><th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${page.records}">
                        <td th:text="${app.userName}">-</td>
                        <td th:text="${app.userPhone}">-</td>
                        <td th:text="${app.petName}">-</td>
                        <td th:text="${app.occupation}">-</td>
                        <td th:text="${app.housingType}">-</td>
                        <td>
                            <span class="badge bg-warning" th:if="${app.status == 0}">待审核</span>
                            <span class="badge bg-success" th:if="${app.status == 1}">已通过</span>
                            <span class="badge bg-danger" th:if="${app.status == 2}">已驳回</span>
                        </td>
                        <td th:text="${#temporals.format(app.createTime, 'yyyy-MM-dd HH:mm')}">-</td>
                        <td>
                            <th:block th:if="${app.status == 0}">
                                <button class="btn btn-sm btn-success" th:attr="onclick='audit(' + ${app.id} + ',\"approve\")'">通过</button>
                                <button class="btn btn-sm btn-danger" th:attr="onclick='audit(' + ${app.id} + ',\"reject\")'">驳回</button>
                            </th:block>
                            <span class="text-muted" th:if="${app.status != 0}" th:text="${app.auditComment}">-</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}">
                        <td colspan="8" class="text-center py-3">暂无申请记录</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function audit(id, action) {
            var comment = prompt(action === 'approve' ? '审核意见（通过）：' : '驳回原因：');
            if (comment === null) return;
            var url = action === 'approve' ? '/admin/application/approve/' + id : '/admin/application/reject/' + id;
            $.post(url, {comment: comment}, function(res) {
                alert(res.msg); location.reload();
            }, 'json');
        }
    </script>
</body>
</html>
