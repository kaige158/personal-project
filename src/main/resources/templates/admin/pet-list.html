<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='宠物管理')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-paw"></i> 宠物管理</h4>
            <a href="/admin/pet/add" class="btn btn-primary"><i class="bi bi-plus"></i> 新增宠物</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover shadow-sm">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th><th>名称</th><th>品种</th><th>年龄</th><th>性别</th><th>状态</th><th>录入时间</th><th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pet : ${page.records}">
                        <td th:text="${pet.id}">1</td>
                        <td th:text="${pet.name}">-</td>
                        <td th:text="${pet.breed}">-</td>
                        <td th:text="${pet.age}">-</td>
                        <td th:text="${pet.gender == 1 ? '公' : '母'}">-</td>
                        <td>
                            <span class="badge bg-success" th:if="${pet.status == 0}">待领养</span>
                            <span class="badge bg-secondary" th:if="${pet.status == 1}">已领养</span>
                            <span class="badge bg-danger" th:if="${pet.status == 2}">已下架</span>
                        </td>
                        <td th:text="${#temporals.format(pet.createTime, 'yyyy-MM-dd')}">-</td>
                        <td>
                            <a th:href="@{/admin/pet/edit/{id}(id=${pet.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                            <button class="btn btn-sm btn-outline-danger" th:if="${pet.status == 0}"
                                    th:attr="onclick='offPet(' + ${pet.id} + ')'">下架</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}">
                        <td colspan="8" class="text-center py-3">暂无宠物数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function offPet(id) {
            if (confirm('确定要下架这只宠物吗？')) {
                $.post('/admin/pet/off/' + id, function(res) {
                    alert(res.msg); location.reload();
                }, 'json');
            }
        }
    </script>
</body>
</html>
