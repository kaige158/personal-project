<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='公告管理')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-megaphone"></i> 公告管理</h4>
            <a href="/admin/announcement/add" class="btn btn-primary"><i class="bi bi-plus"></i> 新增公告</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover shadow-sm">
                <thead class="table-primary">
                    <tr><th>标题</th><th>置顶</th><th>发布时间</th><th>操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${page.records}">
                        <td th:text="${a.title}">-</td>
                        <td><span class="badge bg-warning" th:if="${a.isTop == 1}">置顶</span>
                            <span class="text-muted" th:if="${a.isTop == 0}">否</span></td>
                        <td th:text="${#temporals.format(a.createTime, 'yyyy-MM-dd')}">-</td>
                        <td>
                            <a th:href="@{/admin/announcement/edit/{id}(id=${a.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                            <button class="btn btn-sm btn-outline-danger" th:attr="onclick='del(' + ${a.id} + ')'">删除</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.records)}"><td colspan="4" class="text-center py-3">暂无公告</td></tr>
                </tbody>
            </table>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        function del(id) {
            if (confirm('确定删除？')) {
                $.post('/admin/announcement/delete/' + id, function(res) { alert(res.msg); location.reload(); }, 'json');
            }
        }
    </script>
</body>
</html>
