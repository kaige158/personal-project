<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title=announcement != null ? '编辑公告' : '新增公告'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4 th:text="${announcement != null ? '编辑公告' : '新增公告'}">新增公告</h4>
        <hr>
        <div class="col-md-8">
            <form id="form">
                <input type="hidden" name="id" th:value="${announcement?.id}">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" name="title" class="form-control" th:value="${announcement?.title}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <textarea name="content" class="form-control" rows="5" th:text="${announcement?.content}" required></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="isTop" value="1" class="form-check-input" id="isTop"
                           th:checked="${announcement?.isTop == 1}">
                    <label class="form-check-label" for="isTop">置顶</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/admin/announcement/list" class="btn btn-secondary">返回</a>
            </form>
            <div id="msg" class="alert mt-3" style="display:none;"></div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#form').submit(function(e) {
            e.preventDefault();
            $.post('/admin/announcement/save', $(this).serialize(), function(res) {
                var m = $('#msg');
                m.text(res.msg).show();
                m.removeClass('alert-danger').addClass(res.code === 200 ? 'alert-success' : 'alert-danger');
                if (res.code === 200) setTimeout(function() { window.location.href = '/admin/announcement/list'; }, 1000);
            }, 'json');
        });
    </script>
</body>
</html>
