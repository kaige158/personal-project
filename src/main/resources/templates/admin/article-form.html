<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title=${article != null ? '编辑文章' : '新增文章'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4 th:text="${article != null ? '编辑科普文章' : '新增科普文章'}">新增文章</h4>
        <hr>
        <div class="col-md-8">
            <form id="articleForm">
                <input type="hidden" name="id" th:value="${article?.id}">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" name="title" class="form-control" th:value="${article?.title}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <textarea name="content" class="form-control" rows="10" th:text="${article?.content}" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/admin/article/list" class="btn btn-secondary">返回</a>
            </form>
            <div id="msg" class="alert mt-3" style="display:none;"></div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#articleForm').submit(function(e) {
            e.preventDefault();
            $.post('/admin/article/save', $(this).serialize(), function(res) {
                var m = $('#msg');
                m.text(res.msg).show();
                m.removeClass('alert-danger').addClass(res.code === 200 ? 'alert-success' : 'alert-danger');
                if (res.code === 200) setTimeout(function() { window.location.href = '/admin/article/list'; }, 1000);
            }, 'json');
        });
    </script>
</body>
</html>
