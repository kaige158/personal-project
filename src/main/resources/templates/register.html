<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='注册 - 宠物领养管理系统')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> 用户注册</h3>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">用户名 <span class="text-danger">*</span></label>
                                <input type="text" name="username" class="form-control" placeholder="3-20位字母或数字" required minlength="3" maxlength="20">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码 <span class="text-danger">*</span></label>
                                <input type="password" name="password" class="form-control" placeholder="至少6位" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                                <input type="password" name="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">真实姓名</label>
                                <input type="text" name="realName" class="form-control" placeholder="请输入真实姓名">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" name="phone" class="form-control" placeholder="请输入手机号">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">注 册</button>
                        </form>

                        <div class="text-center mt-3">
                            <span class="text-muted">已有账号？</span>
                            <a href="/login">立即登录</a>
                        </div>

                        <div id="regMsg" class="alert mt-3" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $('#registerForm').submit(function(e) {
            e.preventDefault();
            var pwd = $('input[name="password"]').val();
            var confirmPwd = $('input[name="confirmPassword"]').val();
            if (pwd !== confirmPwd) {
                $('#regMsg').removeClass('alert-success').addClass('alert-danger').text('两次密码不一致').show();
                return;
            }
            var formData = $(this).serialize();
            $.post('/doRegister', formData, function(res) {
                var msg = $('#regMsg');
                if (res.code === 200) {
                    msg.removeClass('alert-danger').addClass('alert-success').text(res.msg + '，正在跳转...').show();
                    setTimeout(function() {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    msg.removeClass('alert-success').addClass('alert-danger').text(res.msg).show();
                }
            }, 'json');
        });
    </script>
</body>
</html>
