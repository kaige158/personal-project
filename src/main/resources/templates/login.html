<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${title='登录 - 宠物领养管理系统'})"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> 用户登录</h3>

                        <!-- 登录表单 -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">记住我</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登 录</button>
                        </form>

                        <div class="text-center mt-3">
                            <span class="text-muted">还没有账号？</span>
                            <a href="/register">立即注册</a>
                        </div>

                        <!-- 提示信息 -->
                        <div id="loginMsg" class="alert mt-3" style="display:none;"></div>
                    </div>
                </div>

                <!-- 测试账号提示 -->
                <div class="card mt-3">
                    <div class="card-body">
                        <small class="text-muted">
                            <b>测试账号：</b><br>
                            管理员：admin / 123456<br>
                            普通用户：zhangsan / 123456
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        // 登录表单 AJAX 提交
        $('#loginForm').submit(function(e) {
            e.preventDefault();
            var formData = $(this).serialize();
            $.post('/doLogin', formData, function(res) {
                var msg = $('#loginMsg');
                if (res.code === 200) {
                    // 登录成功，根据角色跳转
                    msg.removeClass('alert-danger').addClass('alert-success').text(res.msg).show();
                    setTimeout(function() {
                        if (res.data.role === 1) {
                            window.location.href = '/admin/';  // 管理员 → 后台
                        } else {
                            window.location.href = '/';          // 普通用户 → 首页
                        }
                    }, 800);
                } else {
                    msg.removeClass('alert-success').addClass('alert-danger').text(res.msg).show();
                }
            }, 'json');
        });
    </script>
</body>
</html>
