<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(title='救助机构')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="container py-4">
        <h4><i class="bi bi-building"></i> 合作救助机构</h4>
        <hr>
        <div class="row">
            <div class="col-md-6 mb-3" th:each="org : ${page.records}">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${org.name}">机构名称</h5>
                        <p class="card-text text-muted">
                            <i class="bi bi-geo-alt"></i> <span th:text="${org.address}">地址</span><br>
                            <i class="bi bi-telephone"></i> <span th:text="${org.phone}">电话</span>
                        </p>
                        <p class="card-text" th:text="${org.description}">简介</p>
                    </div>
                </div>
            </div>
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(page.records)}">
                <p class="text-muted">暂无机构信息</p>
            </div>
        </div>
        <div th:replace="fragments/pagination :: pagination(${page})"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
