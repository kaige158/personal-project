# ==========================================
# 宠物领养管理系统 - 主配置文件
# ==========================================

server:
  port: 8080

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456

  # Thymeleaf 模板配置
  thymeleaf:
    cache: false           # 开发阶段关闭缓存，修改页面即时生效
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类包路径（MyBatis-Plus 会在此路径下找实体类）
  type-aliases-package: com.example.petadoption.entity
  # 日志输出（开发阶段可以看到 SQL 语句）
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 下划线转驼峰（数据库 pet_name → Java petName）
    map-underscore-to-camel-case: true
  # 全局配置
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto

# 文件上传路径（本地存储）
file:
  upload:
    path: ./uploads  # 项目根目录下的 uploads 文件夹
